name: Auto-deploy to Mac Studio

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - 'retrieval/**'
      - 'ingest/**'
      - 'dots_ocr/**'
      - 'docker-compose.yml'
      - 'docker-compose.dev.yml'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Force a full --build (skip the source-only fast path)'
        required: false
        default: 'false'

concurrency:
  group: deploy-mac-studio
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: [self-hosted, macOS]
    timeout-minutes: 30

    env:
      COMPOSE_FILES: "-f docker-compose.yml -f docker-compose.dev.yml"

    steps:
      - name: Pull latest into production directory
        working-directory: /Users/macai/Desktop/virchow_rag
        run: |
          PREV=$(git rev-parse HEAD)
          git fetch origin main
          git reset --hard origin/main
          echo "PREV_SHA=$PREV" >> $GITHUB_ENV
          echo "Previous: $PREV"
          echo "Current:  $(git rev-parse HEAD)"

      - name: Stamp build-version file for the desktop-app auto-reload
        working-directory: /Users/macai/Desktop/virchow_rag
        run: |
          # The Pake WebView polls /build-version.txt every 30s. When the SHA
          # here changes, the desktop app silently reloads so users see the
          # new features without closing/reopening the app.
          git rev-parse HEAD > web/public/build-version.txt
          echo "Stamped: $(cat web/public/build-version.txt)"

      - name: Classify changes (source vs dependency vs infra)
        id: changes
        working-directory: /Users/macai/Desktop/virchow_rag
        run: |
          CHANGED=$(git diff --name-only $PREV_SHA HEAD)
          echo "Changed files:"
          echo "$CHANGED"
          echo "---"

          # Rebuild triggers — anything that affects the image content.
          # Source-only changes inside the mounted dirs ride the hot-reload path.
          deps_changed=false
          infra_changed=false
          source_changed=false

          if echo "$CHANGED" | grep -qE '^web/(package(-lock)?\.json|Dockerfile|next\.config\.js|tailwind\.config\.js)$'; then deps_changed=true; fi
          if echo "$CHANGED" | grep -qE '^retrieval/(requirements\.txt|Dockerfile)$'; then deps_changed=true; fi
          if echo "$CHANGED" | grep -qE '^ingest/(requirements\.txt|Dockerfile|docker-entrypoint\.sh)$'; then deps_changed=true; fi
          if echo "$CHANGED" | grep -qE '^(docker-compose\.yml|docker-compose\.dev\.yml)$'; then infra_changed=true; fi
          if echo "$CHANGED" | grep -qE '^(web|retrieval|ingest|dots_ocr)/'; then source_changed=true; fi

          # Manual override from workflow_dispatch
          if [ "${{ github.event.inputs.force_rebuild }}" = "true" ]; then
            deps_changed=true
          fi

          echo "deps=$deps_changed" >> $GITHUB_OUTPUT
          echo "infra=$infra_changed" >> $GITHUB_OUTPUT
          echo "source=$source_changed" >> $GITHUB_OUTPUT
          echo "Plan: deps_changed=$deps_changed  infra_changed=$infra_changed  source_changed=$source_changed"

      # ── FAST PATH: source-only changes ─────────────────────────────────────
      # Next.js HMR + uvicorn --reload + watchmedo pick up source changes via
      # the bind mounts. No image rebuild, no container recreate. Returns in
      # 2–5 seconds.
      - name: Fast path — hot-reload via bind mount
        if: steps.changes.outputs.source == 'true' && steps.changes.outputs.deps == 'false' && steps.changes.outputs.infra == 'false'
        working-directory: /Users/macai/Desktop/virchow_rag
        run: |
          echo "Source-only change — relying on HMR / --reload. Verifying services are up:"
          docker compose $COMPOSE_FILES ps

      # ── REBUILD PATH: infra or dep changes ─────────────────────────────────
      - name: Full rebuild + recreate (deps or infra change)
        if: steps.changes.outputs.deps == 'true' || steps.changes.outputs.infra == 'true'
        working-directory: /Users/macai/Desktop/virchow_rag
        run: |
          docker compose $COMPOSE_FILES up -d --build

      - name: Wait for services to settle
        if: steps.changes.outputs.deps == 'true' || steps.changes.outputs.infra == 'true'
        run: sleep 25

      - name: Health check
        working-directory: /Users/macai/Desktop/virchow_rag
        run: |
          set +e
          status=0
          check() {
            local name=$1; local url=$2
            if curl -fs --max-time 10 "$url" > /dev/null; then
              echo "ok   $name"
            else
              echo "FAIL $name ($url)"
              status=1
            fi
          }
          check "web      " "http://localhost:3000"
          check "retrieval" "http://localhost:8080/health"
          check "ingest   " "http://localhost:8000/health"
          exit $status

      - name: Deployment summary
        if: always()
        run: |
          echo "### Deployment summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.changes.outputs.deps }}" = "true" ] || [ "${{ steps.changes.outputs.infra }}" = "true" ]; then
            echo "- Path: **full rebuild**" >> $GITHUB_STEP_SUMMARY
          else
            echo "- Path: **fast (HMR / --reload, no rebuild)**" >> $GITHUB_STEP_SUMMARY
          fi
          echo "- Deps changed: ${{ steps.changes.outputs.deps }}" >> $GITHUB_STEP_SUMMARY
          echo "- Infra changed: ${{ steps.changes.outputs.infra }}" >> $GITHUB_STEP_SUMMARY
          echo "- Source changed: ${{ steps.changes.outputs.source }}" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
