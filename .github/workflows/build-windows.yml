name: Build Virchow Wiki — Windows

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install WebView2 (pre-installed on windows-latest, this is a safeguard)
        run: |
          $ErrorActionPreference = 'SilentlyContinue'
          $webview2 = Get-ItemProperty "HKLM:\SOFTWARE\WOW6432Node\Microsoft\EdgeUpdate\Clients\{F3017226-FE2A-4295-8BDF-00C3A9A7E4C5}"
          if (-not $webview2) {
            Invoke-WebRequest -Uri "https://go.microsoft.com/fwlink/p/?LinkId=2124703" -OutFile "MicrosoftEdgeWebview2Setup.exe"
            Start-Process -Wait "MicrosoftEdgeWebview2Setup.exe" -ArgumentList "/silent /install"
          }
          Write-Host "WebView2 is available"
        shell: pwsh
        continue-on-error: true

      - name: Build Windows app
        run: |
          npx pake-cli http://192.168.10.99:3000 `
            --name "Virchow Wiki" `
            --width 1440 `
            --height 900 `
            --icon virchow_icon.png `
            --enable-find `
            --activation-shortcut "CmdOrControl+Shift+V"
        shell: pwsh

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: Virchow-Wiki-Windows
          path: |
            Virchow Wiki*.exe
            Virchow Wiki*.msi
          retention-days: 30
